<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Placeholder for a GIF of the green Playwright test run">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f2a"/>
      <stop offset="1" stop-color="#0f131b"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="900" height="480" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="479" rx="14" fill="none" stroke="#2b3242"/>

  <!-- title bar -->
  <rect x="0" y="0" width="900" height="44" rx="14" fill="#161a23"/>
  <rect x="0" y="30" width="900" height="14" fill="#161a23"/>
  <circle cx="26" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="22" r="6" fill="#27c93f"/>
  <text x="450" y="27" text-anchor="middle" font-size="13" fill="#7d8799" fill-opacity="0.7">npm test — playwright</text>

  <!-- terminal body -->
  <g font-size="15">
    <text x="28" y="86" fill="#9aa5b1">$ <tspan fill="#e6edf3">npm test</tspan></text>

    <text x="28" y="120" fill="#7d8799">Running 51 tests using 5 workers</text>

    <text x="28" y="154" fill="#27c93f">  ✓</text>
    <text x="52" y="154" fill="#c9d1d9">  [chromium] auth.spec.ts › standard user logs in</text>
    <text x="820" y="154" fill="#6b7280" text-anchor="end">1.2s</text>

    <text x="28" y="182" fill="#27c93f">  ✓</text>
    <text x="52" y="182" fill="#c9d1d9">  [firefox]  cart.spec.ts › adding products updates badge</text>
    <text x="820" y="182" fill="#6b7280" text-anchor="end">0.9s</text>

    <text x="28" y="210" fill="#27c93f">  ✓</text>
    <text x="52" y="210" fill="#c9d1d9">  [webkit]   checkout.spec.ts › completes an order end-to-end</text>
    <text x="820" y="210" fill="#6b7280" text-anchor="end">1.6s</text>

    <text x="28" y="238" fill="#27c93f">  ✓</text>
    <text x="52" y="238" fill="#c9d1d9">  [chromium] inventory.spec.ts › sorts products by price low→high</text>
    <text x="820" y="238" fill="#6b7280" text-anchor="end">0.8s</text>

    <text x="28" y="266" fill="#27c93f">  ✓</text>
    <text x="52" y="266" fill="#c9d1d9">  [chromium] api.spec.ts › POST /posts creates a resource</text>
    <text x="820" y="266" fill="#6b7280" text-anchor="end">0.4s</text>

    <text x="28" y="300" fill="#6b7280">  … 46 more</text>
  </g>

  <!-- summary pill -->
  <rect x="28" y="330" width="230" height="44" rx="10" fill="#0f2a17" stroke="#27c93f" stroke-opacity="0.5"/>
  <text x="48" y="358" font-size="18" fill="#27c93f" font-weight="700">✓ 51 passed</text>
  <text x="272" y="358" font-size="15" fill="#7d8799">(38.2s)</text>

  <!-- placeholder banner -->
  <rect x="28" y="410" width="844" height="42" rx="10" fill="#1c2230" stroke="#3a4256"/>
  <text x="450" y="436" text-anchor="middle" font-size="13" fill="#8b95a5">
    PLACEHOLDER · replace docs/demo-run.svg with a recorded GIF of your green run
  </text>
</svg>
